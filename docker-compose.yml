services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drs-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5432:5432"
    environment:
      DATABASE_URL: postgresql://drs_user:drs_password@localhost:5432/drs_db
      JWT_SECRET: super-secret-jwt-key-change-in-production-2024
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
